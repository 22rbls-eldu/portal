<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <form action="/buscar-camaras" method="GET">

            <h2>Búsqueda de cámaras</h2>

            <!-- Tipo de cámara -->
            <label for="tipo">Tipo de cámara:</label>
            <select id="tipo" name="tipo">
                <option value="">Cualquiera</option>
                <option value="compacta">Compacta</option>
                <option value="bridge">Bridge</option>
                <option value="evil">EVIL / Mirrorless</option>
                <option value="reflex">Réflex / DSLR</option>
                <option value="instantanea">Instantánea</option>
                <option value="accion">De acción / deportiva</option>
            </select>

            <!-- Marca -->
            <label for="marca">Marca:</label>
            <select id="marca" name="marca">
                <option value="">Cualquiera</option>
                <option value="canon">Canon</option>
                <option value="nikon">Nikon</option>
                <option value="sony">Sony</option>
                <option value="fujifilm">Fujifilm</option>
                <option value="panasonic">Panasonic</option>
                <option value="olympus">Olympus</option>
                <option value="leica">Leica</option>
            </select>

            <!-- Rango de precio -->
            <label for="precio-min">Precio mínimo (€):</label>
            <input type="number" id="precio-min" name="precio_min" min="0">

            <label for="precio-max">Precio máximo (€):</label>
            <input type="number" id="precio-max" name="precio_max" min="0">

            <!-- Resolución -->
            <label for="resolucion">Resolución mínima (MP):</label>
            <input type="number" id="resolucion" name="resolucion" min="1">

            <!-- Tipo de sensor -->
            <label for="sensor">Tipo de sensor:</label>
            <select id="sensor" name="sensor">
                <option value="">Cualquiera</option>
                <option value="full-frame">Full Frame</option>
                <option value="aps-c">APS‑C</option>
                <option value="micro-cuatro-tercios">Micro 4/3</option>
                <option value="1-pulgada">1"</option>
            </select>

            <!-- Extras -->
            <fieldset>
                <legend>Características adicionales</legend>
                <label><input type="checkbox" name="video_4k"> Grabación 4K</label>
                <label><input type="checkbox" name="estabilizador"> Estabilizador</label>
                <label><input type="checkbox" name="wifi"> Wi‑Fi</label>
                <label><input type="checkbox" name="sellado"> Cuerpo sellado</label>
                <label><input type="checkbox" name="pantalla_abatible"> Pantalla abatible</label>
            </fieldset>

            <!-- Botón -->
            <button type="submit">Buscar</button>

        </form>

</body>
</html>
