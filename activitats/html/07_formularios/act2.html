<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Altavoces</title>
</head>
<body>

    <h2>Formulario de Venta de Altavoces</h2>

    <form action="#" method="post">

        <!-- Modelo -->
        <label for="modelo">Modelo:</label>
        <select id="modelo" name="modelo" required>
            <option value="">Seleccione un modelo</option>
            <option value="R4">R4</option>
            <option value="R5">R5</option>
            <option value="SR1">SR1</option>
        </select>
        <br><br>

        <!-- Potencia -->
        <label for="potencia">Potencia máxima (50-100W):</label>
        <input type="number" id="potencia" name="potencia" min="50" max="100" required>
        <br><br>

        <!-- Bluetooth -->
        <label>¿Bluetooth?</label>
        <input type="radio" id="bt_si" name="bluetooth" value="sí" required>
        <label for="bt_si">Sí</label>

        <input type="radio" id="bt_no" name="bluetooth" value="no">
        <label for="bt_no">No</label>
        <br><br>

        <!-- Color -->
        <label for="color">Color:</label>
        <input type="text" id="color" name="color" placeholder="Ej: negro, blanco..." required>
        <br><br>

        <button type="submit">Enviar</button>

    </form>

</body>
</html>
